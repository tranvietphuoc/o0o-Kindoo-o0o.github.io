name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read # Chỉ cần read để lấy code
  pages: write   # Cần để deploy lên Pages
  id-token: write

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bước cài đặt pnpm (SRE nên dùng bản cụ thể để tránh lỗi môi trường)
      - uses: pnpm/action-setup@v3
        with:
          version: 8 # Hoặc bản bạn đang dùng trên X1 Carbon

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # Tương đương npm ci, đảm bảo đúng file lock

      - name: Build website
        run: pnpm run build

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://o0o-kindoo-o0o.github.io/
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
